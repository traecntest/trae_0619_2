<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>虚拟时间映射系统</title>
<script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
<style>
  :root {
    --bg: #0b1020;
    --panel: #121a33;
    --accent: #5eead4;
    --accent-2: #818cf8;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --danger: #f87171;
    --success: #4ade80;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: radial-gradient(1200px 600px at 50% -100px, #1e293b 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 560px;
  }
  .card {
    background: var(--panel);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.05);
  }
  h1 {
    margin: 0 0 8px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .subtitle { color: var(--muted); margin-bottom: 20px; font-size: 13px; }
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 18px;
    background: rgba(255,255,255,0.03);
    padding: 4px;
    border-radius: 10px;
  }
  .tab {
    flex: 1;
    padding: 8px 12px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.2s;
    user-select: none;
  }
  .tab.active {
    background: linear-gradient(135deg, rgba(94,234,212,0.15), rgba(129,140,248,0.15));
    color: var(--text);
    font-weight: 500;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin: 12px 0 6px;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  button {
    width: 100%;
    margin-top: 18px;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b1020;
  }
  button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(94,234,212,0.25); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary {
    background: rgba(255,255,255,0.06);
    color: var(--text);
  }
  button.danger {
    background: linear-gradient(135deg, var(--danger), #fb923c);
    color: #fff;
  }
  .error {
    margin-top: 12px;
    padding: 10px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--danger);
    border-radius: 10px;
    font-size: 13px;
  }
  .success {
    margin-top: 12px;
    padding: 10px;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.3);
    color: var(--success);
    border-radius: 10px;
    font-size: 13px;
  }
  .timer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0 30px;
  }
  canvas { display: block; }
  .time-display {
    margin-top: -150px;
    text-align: center;
    z-index: 1;
  }
  .big-time {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .small-info {
    margin-top: 4px;
    font-size: 12px;
    color: var(--muted);
  }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    margin-right: 6px;
  }
  .badge.running { background: rgba(74,222,128,0.15); color: var(--success); }
  .badge.paused { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .badge.completed { background: rgba(129,140,248,0.15); color: var(--accent-2); }
  .controls {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }
  .controls button { margin-top: 0; }
  .user-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: 13px;
  }
  .username { color: var(--accent); font-weight: 600; }
  .logout-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 4px 10px;
    font-size: 12px;
    margin: 0;
    width: auto;
    border-radius: 8px;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.05); transform: none; box-shadow: none; color: var(--text); }
  .hidden { display: none !important; }
  .session-title {
    text-align: center;
    margin-top: 16px;
    font-size: 15px;
    color: var(--text);
  }
  .compare-wrap {
    display: flex;
    align-items: stretch;
    gap: 10px;
    margin-top: 22px;
    padding: 14px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
  }
  .compare-card {
    flex: 1;
    text-align: center;
    padding: 12px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    transition: all 0.2s;
  }
  .compare-card.virtual {
    background: linear-gradient(135deg, rgba(94,234,212,0.1), rgba(129,140,248,0.1));
    border: 1px solid rgba(94,234,212,0.25);
  }
  .compare-card.real {
    background: rgba(148,163,184,0.08);
    border: 1px solid rgba(148,163,184,0.2);
  }
  .compare-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .compare-time {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    letter-spacing: 1px;
  }
  .compare-card.virtual .compare-time {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .compare-card.real .compare-time {
    color: #cbd5e1;
  }
  .compare-tag {
    margin-top: 6px;
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 600;
    background: rgba(94,234,212,0.15);
    color: var(--accent);
  }
  .compare-tag.real-tag {
    background: rgba(148,163,184,0.15);
    color: var(--muted);
  }
  .compare-arrow {
    display: flex;
    align-items: center;
    color: var(--muted);
    font-size: 20px;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <!-- Auth view -->
    <div id="authView">
      <h1>虚拟时间映射系统</h1>
      <div class="subtitle">通过倍速系数，让时间在专注中飞逝</div>
      <div class="tabs">
        <div class="tab active" data-tab="login">登录</div>
        <div class="tab" data-tab="register">注册</div>
      </div>
      <label for="authUsername">用户名</label>
      <input id="authUsername" type="text" placeholder="请输入用户名" />
      <label for="authPassword">密码</label>
      <input id="authPassword" type="password" placeholder="请输入密码" />
      <div id="authEmailWrap" class="hidden">
        <label for="authEmail">邮箱（可选）</label>
        <input id="authEmail" type="email" placeholder="your@email.com" />
      </div>
      <button id="authSubmitBtn">登录</button>
      <div id="authMsg"></div>
    </div>

    <!-- App view -->
    <div id="appView" class="hidden">
      <div class="user-row">
        <span>欢迎, <span class="username" id="usernameLabel"></span></span>
        <button class="logout-btn" id="logoutBtn">退出登录</button>
      </div>

      <!-- No session view -->
      <div id="noSessionView">
        <h1>创建专注会话</h1>
        <div class="subtitle">设定目标时长与倍速，开始你的虚拟时间之旅</div>
        <label for="sessionTitle">会话标题</label>
        <input id="sessionTitle" type="text" placeholder="例如：阅读《深入理解计算机系统》" value="专注会话" />
        <div class="row">
          <div>
            <label for="plannedMinutes">计划时长（分钟）</label>
            <input id="plannedMinutes" type="number" value="60" min="1" step="1" />
          </div>
          <div>
            <label for="speedRate">倍速系数（1:N）</label>
            <input id="speedRate" type="number" value="10" min="1" step="1" />
          </div>
        </div>
        <button id="createSessionBtn">开始专注</button>
        <div id="createMsg"></div>
      </div>

      <!-- Session view -->
      <div id="sessionView" class="hidden">
        <div class="session-title" id="sessionTitleDisplay"></div>
        <div class="timer-wrap">
          <canvas id="progressCanvas" width="320" height="320"></canvas>
          <div class="time-display">
            <div class="big-time" id="bigTime">00:00:00</div>
            <div class="small-info">
              <span id="statusBadge" class="badge running">进行中</span>
              <span id="speedLabel">x10 倍速</span>
              <span> · </span>
              <span id="progressLabel">0%</span>
            </div>
          </div>
        </div>

        <div class="compare-wrap">
          <div class="compare-card virtual">
            <div class="compare-label">虚拟流逝时间</div>
            <div class="compare-time" id="virtualTimeSmall">00:00:00</div>
            <div class="compare-tag" id="virtualTag">x10 倍速</div>
          </div>
          <div class="compare-arrow">→</div>
          <div class="compare-card real">
            <div class="compare-label">真实流逝时间 (1:1)</div>
            <div class="compare-time" id="realTimeSmall">00:00:00</div>
            <div class="compare-tag real-tag">无加速对比</div>
          </div>
        </div>

        <div class="controls">
          <button id="pauseBtn" class="secondary">暂停</button>
          <button id="finishBtn" class="danger">结束</button>
        </div>
        <div id="sessionMsg"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  const API_BASE = window.location.origin + "/api";
  const TOKEN_KEY = "vt_token";
  const USER_KEY = "vt_user";

  const state = {
    token: localStorage.getItem(TOKEN_KEY) || null,
    user: JSON.parse(localStorage.getItem(USER_KEY) || "null"),
    session: null,
    displayProgress: 0,
    displayVirtualSeconds: 0,
    animFrame: null,
    lastPollAt: 0,
    isPaused: false,
  };

  const $ = (id) => document.getElementById(id);

  /* ---------- Axios setup with interceptor, retry & debounce ---------- */
  const axiosInstance = axios.create({ baseURL: API_BASE, timeout: 15000 });

  axiosInstance.interceptors.request.use((config) => {
    if (state.token) config.headers.Authorization = "Token " + state.token;
    return config;
  });

  axiosInstance.interceptors.response.use(
    (r) => r,
    async (error) => {
      const cfg = error.config || {};
      cfg.__retry = cfg.__retry || 0;
      const isRetryable =
        error.code === "ECONNABORTED" ||
        (error.response && (error.response.status === 409 || error.response.status >= 500));
      if (isRetryable && cfg.__retry < 3) {
        cfg.__retry += 1;
        const delay = Math.pow(2, cfg.__retry) * 300;
        await new Promise((r) => setTimeout(r, delay));
        return axiosInstance.request(cfg);
      }
      if (error.response && error.response.status === 401) {
        clearAuth();
        showAuth();
      }
      return Promise.reject(error);
    }
  );

  function debounce(fn, wait) {
    let t;
    return function (...args) {
      if (t) clearTimeout(t);
      t = setTimeout(() => fn.apply(this, args), wait);
    };
  }

  const debouncedHeartbeat = debounce(async (sessionId) => {
    if (!sessionId) return;
    try {
      await axiosInstance.post(`/sessions/${sessionId}/heartbeat/`, { client_ts: Date.now() });
    } catch (e) {}
  }, 2500);

  /* ---------- Auth ---------- */
  function saveAuth(token, user) {
    state.token = token;
    state.user = user;
    localStorage.setItem(TOKEN_KEY, token);
    localStorage.setItem(USER_KEY, JSON.stringify(user));
  }
  function clearAuth() {
    state.token = null;
    state.user = null;
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(USER_KEY);
  }

  async function handleAuthSubmit() {
    const username = $("authUsername").value.trim();
    const password = $("authPassword").value;
    const email = $("authEmail").value.trim();
    const isRegister = document.querySelector(".tab.active").dataset.tab === "register";
    const msg = $("authMsg");
    msg.innerHTML = "";

    if (!username || !password) {
      msg.innerHTML = '<div class="error">请填写用户名和密码</div>';
      return;
    }
    try {
      const url = isRegister ? "/auth/register/" : "/auth/login/";
      const payload = isRegister ? { username, password, email } : { username, password };
      const { data } = await axiosInstance.post(url, payload);
      saveAuth(data.token, data.user);
      msg.innerHTML = '<div class="success">登录成功</div>';
      setTimeout(() => { showApp(); loadActiveSession(); }, 300);
    } catch (err) {
      const detail = (err.response && err.response.data && (err.response.data.error || err.response.data.detail || JSON.stringify(err.response.data))) || err.message;
      msg.innerHTML = '<div class="error">' + detail + '</div>';
    }
  }

  function showAuth() {
    $("authView").classList.remove("hidden");
    $("appView").classList.add("hidden");
  }
  function showApp() {
    $("authView").classList.add("hidden");
    $("appView").classList.remove("hidden");
    $("usernameLabel").textContent = (state.user && state.user.username) || "";
  }

  /* ---------- Session ---------- */
  async function createSession() {
    const title = $("sessionTitle").value.trim() || "专注会话";
    const plannedMinutes = Math.max(1, parseFloat($("plannedMinutes").value) || 60);
    const speedRate = Math.max(1, parseFloat($("speedRate").value) || 10);
    const msg = $("createMsg");
    msg.innerHTML = "";
    try {
      const { data } = await axiosInstance.post("/sessions/", {
        title,
        speed_rate: speedRate,
        total_planned_virtual_minutes: plannedMinutes,
      });
      setSession(data);
    } catch (err) {
      if (err.response && err.response.status === 409 && err.response.data && err.response.data.session) {
        setSession(err.response.data.session);
        return;
      }
      const detail = (err.response && err.response.data && (err.response.data.error || err.response.data.detail || JSON.stringify(err.response.data))) || err.message;
      msg.innerHTML = '<div class="error">' + detail + '</div>';
    }
  }

  async function loadActiveSession() {
    try {
      const { data } = await axiosInstance.get("/sessions/active/");
      setSession(data);
    } catch (err) {
      if (err.response && err.response.status === 404) {
        setSession(null);
      }
    }
  }

  async function pauseSession() {
    if (!state.session) return;
    try {
      const { data } = await axiosInstance.post(`/sessions/${state.session.session_id}/pause/`);
      setSession(data);
    } catch (e) {}
  }
  async function resumeSession() {
    if (!state.session) return;
    try {
      const { data } = await axiosInstance.post(`/sessions/${state.session.session_id}/resume/`);
      setSession(data);
    } catch (e) {}
  }
  async function finishSession(skipConfirm = false) {
    if (!state.session || state.finishing) return;
    if (!skipConfirm && !confirm("确定要结束当前专注会话吗？数据将保存到数据库。")) return;
    state.finishing = true;
    try {
      const { data } = await axiosInstance.post(`/sessions/${state.session.session_id}/finish/`);
      setSession(data);
    } catch (e) {
      state.finishing = false;
    }
  }

  function setSession(sess) {
    state.session = sess;
    state.finishing = false;
    if (!sess) {
      $("noSessionView").classList.remove("hidden");
      $("sessionView").classList.add("hidden");
      stopLoop();
      return;
    }
    $("noSessionView").classList.add("hidden");
    $("sessionView").classList.remove("hidden");
    $("sessionTitleDisplay").textContent = sess.title || "专注会话";
    $("speedLabel").textContent = "x" + sess.speed_rate + " 倍速";
    $("virtualTag").textContent = "x" + sess.speed_rate + " 倍速";
    const badge = $("statusBadge");
    badge.className = "badge " + sess.status;
    badge.textContent = sess.status === "running" ? "进行中" : sess.status === "paused" ? "已暂停" : "已完成";
    const pauseBtn = $("pauseBtn");
    if (sess.status === "running") {
      pauseBtn.textContent = "暂停";
      pauseBtn.onclick = pauseSession;
    } else if (sess.status === "paused") {
      pauseBtn.textContent = "继续";
      pauseBtn.onclick = resumeSession;
    } else {
      pauseBtn.textContent = "已结束";
      pauseBtn.disabled = true;
    }
    $("finishBtn").disabled = sess.status === "completed";
    state.isPaused = sess.status !== "running";
    startLoop();
  }

  /* ---------- Canvas animation loop with Lerp ---------- */
  const canvas = $("progressCanvas");
  const ctx = canvas.getContext("2d");
  const CX = canvas.width / 2;
  const CY = canvas.height / 2;
  const RADIUS = 130;
  const LINE_WIDTH = 14;

  function drawProgress(progress) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath();
    ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2);
    ctx.lineWidth = LINE_WIDTH;
    ctx.strokeStyle = "rgba(255,255,255,0.06)";
    ctx.lineCap = "round";
    ctx.stroke();

    const start = -Math.PI / 2;
    const end = start + Math.PI * 2 * Math.max(0, Math.min(1, progress));
    const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    gradient.addColorStop(0, "#5eead4");
    gradient.addColorStop(1, "#818cf8");
    ctx.beginPath();
    ctx.arc(CX, CY, RADIUS, start, end);
    ctx.lineWidth = LINE_WIDTH;
    ctx.strokeStyle = gradient;
    ctx.lineCap = "round";
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(CX, CY, RADIUS - LINE_WIDTH - 8, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.015)";
    ctx.fill();
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  function formatHMS(seconds) {
    seconds = Math.max(0, Math.floor(seconds));
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    return [h, m, s].map((x) => String(x).padStart(2, "0")).join(":");
  }

  function computeLocalVirtualSeconds() {
    if (!state.session) return 0;
    const s = state.session;
    if (s.status === "completed") {
      return Math.min(s.virtual_seconds || 0, s.total_planned_virtual_seconds);
    }
    if (s.status === "paused") {
      return s.accumulated_virtual_seconds || 0;
    }
    const base = s.accumulated_virtual_seconds || 0;
    const startReal = s.last_pause_real_timestamp || s.start_real_timestamp || (Date.now() / 1000);
    const deltaReal = Math.max(0, Date.now() / 1000 - startReal);
    const deltaVirtual = deltaReal * (s.speed_rate || 10);
    return Math.min(base + deltaVirtual, s.total_planned_virtual_seconds);
  }

  function computeLocalRealSeconds() {
    if (!state.session) return 0;
    const s = state.session;
    const baseVirtual = s.accumulated_virtual_seconds || 0;
    const baseReal = baseVirtual / (s.speed_rate || 10);
    if (s.status === "completed") {
      return baseReal;
    }
    if (s.status === "paused") {
      return baseReal;
    }
    const startReal = s.last_pause_real_timestamp || s.start_real_timestamp || (Date.now() / 1000);
    const deltaReal = Math.max(0, Date.now() / 1000 - startReal);
    return baseReal + deltaReal;
  }

  function startLoop() {
    if (state.animFrame) return;
    let last = performance.now();
    function tick(now) {
      const dt = (now - last) / 1000;
      last = now;
      const s = state.session;
      if (s) {
        const target = computeLocalVirtualSeconds();
        const targetProgress = s.total_planned_virtual_seconds > 0
          ? target / s.total_planned_virtual_seconds : 0;
        const speedLerp = Math.min(1, dt * 8 * (s.speed_rate ? Math.min(5, s.speed_rate / 2) : 1));
        state.displayVirtualSeconds = lerp(state.displayVirtualSeconds, target, speedLerp);
        state.displayProgress = lerp(state.displayProgress, targetProgress, speedLerp);

        $("bigTime").textContent = formatHMS(state.displayVirtualSeconds);
        $("progressLabel").textContent = Math.round(state.displayProgress * 100) + "%";
        drawProgress(state.displayProgress);

        const realSeconds = computeLocalRealSeconds();
        $("virtualTimeSmall").textContent = formatHMS(state.displayVirtualSeconds);
        $("realTimeSmall").textContent = formatHMS(realSeconds);

        if (!state.isPaused && s.status === "running") {
          if (Date.now() - state.lastPollAt > 5000) {
            state.lastPollAt = Date.now();
            axiosInstance.get(`/sessions/active/`).then(({ data }) => {
              if (data && data.session_id === state.session.session_id) {
                state.session = data;
                if (data.status === "completed") setSession(data);
                else {
                  const badge = $("statusBadge");
                  badge.className = "badge " + data.status;
                  badge.textContent = data.status === "running" ? "进行中" : "已暂停";
                  state.isPaused = data.status !== "running";
                }
              }
            }).catch(() => {});
          }
          debouncedHeartbeat(s.session_id);
        }

        if (targetProgress >= 1 && s.status !== "completed" && !state.finishing) {
          finishSession(true);
        }
      }
      state.animFrame = requestAnimationFrame(tick);
    }
    state.animFrame = requestAnimationFrame(tick);
  }
  function stopLoop() {
    if (state.animFrame) cancelAnimationFrame(state.animFrame);
    state.animFrame = null;
  }

  /* ---------- Event binding ---------- */
  document.querySelectorAll(".tab").forEach((el) => {
    el.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      el.classList.add("active");
      const isRegister = el.dataset.tab === "register";
      $("authEmailWrap").classList.toggle("hidden", !isRegister);
      $("authSubmitBtn").textContent = isRegister ? "注册并登录" : "登录";
    });
  });
  $("authSubmitBtn").addEventListener("click", handleAuthSubmit);
  ["authUsername", "authPassword", "authEmail"].forEach((id) => {
    $(id).addEventListener("keydown", (e) => { if (e.key === "Enter") handleAuthSubmit(); });
  });
  $("logoutBtn").addEventListener("click", () => {
    clearAuth();
    state.session = null;
    stopLoop();
    showAuth();
  });
  $("createSessionBtn").addEventListener("click", createSession);
  $("finishBtn").addEventListener("click", finishSession);

  /* ---------- Init ---------- */
  if (state.token && state.user) {
    showApp();
    loadActiveSession();
  } else {
    showAuth();
  }
})();
</script>
</body>
</html>
